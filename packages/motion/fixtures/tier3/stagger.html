<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #141418; display: flex; gap: 24px; align-items: center; justify-content: center; height: 100vh; }
  .card { width: 150px; height: 210px; border-radius: 14px; background: #3a3a55; transform: translateY(80px); opacity: 0.99; }
  button { position: fixed; top: 12px; left: 12px; }
</style>
</head>
<body>
<button id="go">go</button>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<script>
  // fake engine global so the phase3 gate exercises detection
  window.gsap = { version: '3.12.5-fixture-fake' };
  const bez = (x1, y1, x2, y2) => {
    const cb = (t, a1, a2) => (((1 - 3 * a2 + 3 * a1) * t + (3 * a2 - 6 * a1)) * t + 3 * a1) * t;
    return (x) => {
      if (x <= 0) return 0;
      if (x >= 1) return 1;
      let lo = 0, hi = 1, t, c, i = 0;
      do { t = lo + (hi - lo) / 2; c = cb(t, x1, x2) - x; if (c > 0) hi = t; else lo = t; } while (Math.abs(c) > 1e-7 && ++i < 12);
      return cb(t, y1, y2);
    };
  };
  const ease = bez(0.22, 1, 0.36, 1);
  function reveal(el) {
    let t0 = null; // clock starts on the first frame (no head-skip)
    function step() {
      const now = performance.now();
      if (t0 === null) t0 = now;
      const p = Math.min(1, (now - t0) / 500);
      el.style.transform = `translateY(${80 * (1 - ease(p))}px)`;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(() => requestAnimationFrame(step));
  }
  document.getElementById('go').addEventListener('click', () => {
    const cards = document.querySelectorAll('.card');
    cards.forEach((el, i) => setTimeout(() => reveal(el), i * 120));
  });
</script>
</body>
</html>

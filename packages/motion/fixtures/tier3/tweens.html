<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #101018; display: grid; place-items: center; height: 100vh; grid-auto-flow: column; gap: 20px; }
  .box { width: 120px; height: 120px; border-radius: 16px; }
  #b1 { background: #4f6df5; } #b2 { background: #f5a54f; } #b3 { background: #4ff5a5; }
  button { position: fixed; top: 12px; left: 12px; }
</style>
</head>
<body>
<button id="go">go</button>
<div class="box" id="b1"></div>
<div class="box" id="b2"></div>
<div class="box" id="b3"></div>
<script>
  // rAF animators with exact bezier easing — ground truth for the Tier 3 fitter gate
  const bez = (x1, y1, x2, y2) => {
    const cb = (t, a1, a2) => (((1 - 3 * a2 + 3 * a1) * t + (3 * a2 - 6 * a1)) * t + 3 * a1) * t;
    return (x) => {
      if (x <= 0) return 0;
      if (x >= 1) return 1;
      let lo = 0, hi = 1, t, c, i = 0;
      do { t = lo + (hi - lo) / 2; c = cb(t, x1, x2) - x; if (c > 0) hi = t; else lo = t; } while (Math.abs(c) > 1e-7 && ++i < 12);
      return cb(t, y1, y2);
    };
  };
  function tween(el, from, to, dur, ease, fmt) {
    let t0 = null; // clock starts on the first frame (no head-skip)
    function step() {
      const now = performance.now();
      if (t0 === null) t0 = now;
      const p = Math.min(1, (now - t0) / dur);
      fmt(el, from + (to - from) * ease(p));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(() => requestAnimationFrame(step));
  }
  document.getElementById('go').addEventListener('click', () => {
    tween(document.getElementById('b1'), 0, 240, 600, bez(0.25, 0.1, 0.25, 1), (el, v) => (el.style.transform = `translateX(${v}px)`));
    tween(document.getElementById('b2'), 1, 0.2, 800, bez(0.42, 0, 0.58, 1), (el, v) => (el.style.opacity = v));
    tween(document.getElementById('b3'), 0, 160, 700, bez(0.34, 1.56, 0.64, 1), (el, v) => (el.style.transform = `translateY(${v}px)`));
  });
</script>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #f5f5f7; display: grid; place-items: center; height: 100vh; }
  .btn {
    width: 220px; height: 64px; border: 0; border-radius: 12px;
    background: #3245ff; color: #fff; font: 600 18px system-ui;
    transition: transform 400ms cubic-bezier(.2,.8,.2,1), background-color 400ms ease;
  }
  .btn:hover { transform: translateY(-8px) scale(1.06); background-color: #bf40bf; }
</style>
</head>
<body><button class="btn">Hover me</button></body>
</html>

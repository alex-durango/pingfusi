<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #101014; display: grid; place-items: center; height: 100vh; }
  .hero {
    width: 320px; height: 120px; border-radius: 16px;
    background: linear-gradient(135deg, #ff8a00, #e52e71);
    animation: enter 800ms cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes enter {
    from { opacity: 0; transform: translateY(80px) scale(.8); }
    60%  { opacity: 1; transform: translateY(-12px) scale(1.03); animation-timing-function: ease-out; }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body><div class="hero"></div></body>
</html>

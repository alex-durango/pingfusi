<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #12140d; color: #f1f4df; }
  .stage { height: 300vh; }
  .sticky { position: sticky; top: 0; height: 100vh; display: grid; place-items: center; overflow: hidden; }
  .ball { width: 180px; height: 180px; border-radius: 50%; background: #d8ff53; transform: scale(0); opacity: .1; }
  footer { height: 50vh; display: grid; place-items: center; }
</style>
</head>
<body>
<section id="stage" class="stage"><div class="sticky"><div id="circle" class="ball"></div></div></section>
<footer>linked fixture tail</footer>
<script>
  const mode = new URLSearchParams(location.search).get('mode') || 'source';
  const circle = document.getElementById('circle');
  const stage = document.getElementById('stage');
  if (mode === 'source-section') stage.id = 'source-stage';
  if (mode === 'wrong-alt-section') stage.id = 'candidate-stage';
  if (mode === 'missing') document.getElementById('stage').remove();
  if (mode === 'wrong-alt' || mode === 'wrong-alt-section') circle.id = 'clone-ball';
  const target = document.querySelector('#circle, #clone-ball');
  function update() {
    if (!target || mode === 'static') return;
    const progress = Math.max(0, Math.min(1, scrollY / (innerHeight * 2)));
    const value = mode.startsWith('wrong') ? Math.min(1, progress * .58) : progress;
    target.style.transform = `scale(${value})`;
    target.style.opacity = String(.1 + value * .9);
  }
  addEventListener('scroll', update, { passive: true });
  update();
</script>
</body>
</html>
